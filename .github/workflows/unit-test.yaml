name: unit-tests
on: push

jobs:
  test:
    strategy:
      matrix:
        # runner: [ubuntu-latest, windows-latest]
        # setup-rsync fails because it detects an ubuntu system...
        runner: [ubuntu-latest]
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node
        uses: actions/setup-node@v6

      - name: Setup rsync
        uses: GuillaumeFalourd/setup-rsync@v1.2

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Run Test
        run: npm run test:ci
